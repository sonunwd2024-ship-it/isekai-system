<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient - dark navy like original -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060d1f"/>
    </linearGradient>

    <!-- Cyan glow gradient for circle ring -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00eeff"/>
      <stop offset="50%" stop-color="#00ccff"/>
      <stop offset="100%" stop-color="#0088ff"/>
    </linearGradient>

    <!-- H letterform gradient -->
    <linearGradient id="hGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00eeff"/>
      <stop offset="100%" stop-color="#0066cc"/>
    </linearGradient>

    <!-- Arrow gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ccff"/>
      <stop offset="100%" stop-color="#00ffee"/>
    </linearGradient>

    <!-- Cyan outer glow filter -->
    <filter id="glowOuter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Tight glow for details -->
    <filter id="glowTight" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Character glow -->
    <filter id="charGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Inner shadow for depth -->
    <filter id="innerShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.6"/>
    </filter>

    <!-- Rounded rect clip -->
    <clipPath id="roundedClip">
      <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- ══════════════════════════════ -->
  <!-- BACKGROUND                     -->
  <!-- ══════════════════════════════ -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Subtle inner vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.5)"/>
  </radialGradient>
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#vignette)"/>

  <!-- Background subtle glow behind circle -->
  <circle cx="512" cy="520" r="360" fill="rgba(0,160,220,0.07)" filter="url(#glowOuter)"/>

  <!-- ══════════════════════════════ -->
  <!-- OUTER RING                     -->
  <!-- ══════════════════════════════ -->
  <!-- Glow layer -->
  <circle cx="512" cy="520" r="330" fill="none" stroke="#00ccff" stroke-width="28" opacity="0.25" filter="url(#glowOuter)"/>
  <!-- Main ring -->
  <circle cx="512" cy="520" r="330" fill="none" stroke="url(#ringGrad)" stroke-width="14" opacity="0.95" filter="url(#glowTight)"/>
  <!-- Inner highlight ring -->
  <circle cx="512" cy="520" r="316" fill="none" stroke="rgba(0,230,255,0.15)" stroke-width="3"/>

  <!-- ══════════════════════════════ -->
  <!-- H LETTERFORM                   -->
  <!-- ══════════════════════════════ -->
  <!-- The bold H that forms the base of the logo -->
  <!-- Left vertical bar -->
  <rect x="290" y="310" width="95" height="420" rx="12" fill="url(#hGrad)" filter="url(#glowTight)" opacity="0.95"/>
  <!-- Right vertical bar -->
  <rect x="639" y="310" width="95" height="420" rx="12" fill="url(#hGrad)" filter="url(#glowTight)" opacity="0.95"/>
  <!-- Crossbar -->
  <rect x="290" y="490" width="444" height="80" rx="10" fill="url(#hGrad)" filter="url(#glowTight)" opacity="0.95"/>

  <!-- H inner highlights (3D effect) -->
  <rect x="290" y="310" width="95" height="12" rx="6" fill="rgba(255,255,255,0.35)"/>
  <rect x="639" y="310" width="95" height="12" rx="6" fill="rgba(255,255,255,0.35)"/>
  <rect x="290" y="310" width="14" height="420" rx="7" fill="rgba(255,255,255,0.2)"/>
  <rect x="639" y="310" width="14" height="420" rx="7" fill="rgba(255,255,255,0.2)"/>

  <!-- ══════════════════════════════ -->
  <!-- DIAGONAL SLASH / ARROW         -->
  <!-- ══════════════════════════════ -->
  <!-- The rising diagonal slash cutting through the H -->
  <!-- Glow behind slash -->
  <line x1="420" y1="780" x2="680" y2="280" stroke="#00eeff" stroke-width="40" stroke-linecap="round" opacity="0.2" filter="url(#glowOuter)"/>
  <!-- Main slash -->
  <line x1="420" y1="780" x2="680" y2="280" stroke="url(#arrowGrad)" stroke-width="18" stroke-linecap="round" filter="url(#glowTight)"/>

  <!-- Arrow head at top-right of slash -->
  <polygon points="680,280 635,310 660,345" fill="url(#arrowGrad)" filter="url(#glowTight)"/>
  <!-- Arrow glow -->
  <polygon points="680,280 635,310 660,345" fill="#00eeff" opacity="0.4" filter="url(#glowOuter)"/>

  <!-- ══════════════════════════════ -->
  <!-- ANIME CHARACTER SILHOUETTE     -->
  <!-- ══════════════════════════════ -->
  <!-- Placed centered, slightly above middle, overlapping top of H -->
  <g transform="translate(512, 460)" filter="url(#charGlow)">
    <!-- Character body silhouette - dark with cyan edge highlight -->

    <!-- HEAD -->
    <ellipse cx="0" cy="-195" rx="52" ry="58" fill="#0a1525" stroke="#00ccff" stroke-width="3"/>
    <!-- Spiky hair -->
    <path d="M-52,-200 Q-65,-260 -30,-255 Q-45,-225 -25,-215 Z" fill="#0a1525" stroke="#00ccff" stroke-width="2"/>
    <path d="M-30,-230 Q-20,-280 10,-270 Q-5,-240 5,-225 Z" fill="#0a1525" stroke="#00ccff" stroke-width="2"/>
    <path d="M10,-240 Q30,-275 50,-260 Q30,-230 25,-215 Z" fill="#0a1525" stroke="#00ccff" stroke-width="2"/>
    <path d="M40,-220 Q65,-255 70,-230 Q55,-210 52,-200 Z" fill="#0a1525" stroke="#00ccff" stroke-width="2"/>

    <!-- NECK -->
    <rect x="-18" y="-140" width="36" height="35" fill="#0a1525" stroke="#00ccff" stroke-width="2"/>

    <!-- TORSO / JACKET - arms crossed -->
    <path d="M-70,-105 L-75,80 L75,80 L70,-105 Q40,-120 0,-118 Q-40,-120 -70,-105 Z" fill="#0a1525" stroke="#00ccff" stroke-width="2.5"/>

    <!-- Left arm (crossed) -->
    <path d="M-70,-90 Q-115,-60 -110,0 Q-90,20 -60,10 Q-50,-30 -45,-80 Z" fill="#0a1525" stroke="#00ccff" stroke-width="2.5"/>
    <!-- Right arm (crossed over left) -->
    <path d="M70,-90 Q115,-60 110,0 Q90,20 60,10 Q50,-30 45,-80 Z" fill="#0a1525" stroke="#00ccff" stroke-width="2.5"/>

    <!-- Arms crossed band -->
    <path d="M-65,-30 Q0,-10 65,-30 Q60,20 0,30 Q-60,20 -65,-30 Z" fill="#0d1e35" stroke="#00ccff" stroke-width="2"/>

    <!-- LEGS -->
    <rect x="-55" y="80" width="46" height="130" rx="10" fill="#0a1525" stroke="#00ccff" stroke-width="2.5"/>
    <rect x="9" y="80" width="46" height="130" rx="10" fill="#0a1525" stroke="#00ccff" stroke-width="2.5"/>

    <!-- FEET -->
    <ellipse cx="-32" cy="215" rx="38" ry="16" fill="#0a1525" stroke="#00ccff" stroke-width="2"/>
    <ellipse cx="32" cy="215" rx="38" ry="16" fill="#0a1525" stroke="#00ccff" stroke-width="2"/>

    <!-- Cyan eye glow -->
    <ellipse cx="-16" cy="-200" rx="10" ry="7" fill="#00eeff" opacity="0.9"/>
    <ellipse cx="16" cy="-200" rx="10" ry="7" fill="#00eeff" opacity="0.9"/>
    <ellipse cx="-16" cy="-200" rx="5" ry="4" fill="white"/>
    <ellipse cx="16" cy="-200" rx="5" ry="4" fill="white"/>

    <!-- Body edge highlight (cyan rim light effect) -->
    <path d="M-70,-105 Q-115,-60 -110,0 Q-90,30 -55,80 L-55,210" fill="none" stroke="rgba(0,200,255,0.6)" stroke-width="3"/>
    <path d="M70,-105 Q115,-60 110,0 Q90,30 55,80 L55,210" fill="none" stroke="rgba(0,200,255,0.6)" stroke-width="3"/>
  </g>

  <!-- ══════════════════════════════ -->
  <!-- EXTRA GLOW ACCENTS             -->
  <!-- ══════════════════════════════ -->
  <!-- Bottom arc glow under character feet -->
  <ellipse cx="512" cy="720" rx="120" ry="18" fill="#00ccff" opacity="0.18" filter="url(#glowOuter)"/>

  <!-- Corner accent sparkles -->
  <g fill="#00eeff" opacity="0.7" filter="url(#glowTight)">
    <polygon points="168,168 178,158 188,168 178,178"/>
    <polygon points="856,168 866,158 876,168 866,178"/>
    <polygon points="168,856 178,846 188,856 178,866"/>
  </g>

  <!-- ══════════════════════════════ -->
  <!-- OUTER BORDER GLOW              -->
  <!-- ══════════════════════════════ -->
  <rect x="4" y="4" width="1016" height="1016" rx="218" ry="218" fill="none" stroke="rgba(0,200,255,0.3)" stroke-width="8"/>
  <rect x="14" y="14" width="996" height="996" rx="210" ry="210" fill="none" stroke="rgba(0,200,255,0.1)" stroke-width="4"/>
</svg>
